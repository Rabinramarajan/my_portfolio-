name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Nightly full regression at 01:30 UTC
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      grep:
        description: 'Tag filter (e.g. @smoke, @regression)'
        required: false
        default: ''

jobs:
  e2e:
    name: ${{ matrix.project }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Run tests (PR/push = smoke+regression, nightly = everything)
        env:
          TEST_ENV: dev
          GREP: ${{ github.event_name == 'schedule' && '' || (github.event.inputs.grep || '@smoke|@regression') }}
        run: |
          if [ -n "$GREP" ]; then
            npx playwright test --project=${{ matrix.project }} --grep "$GREP"
          else
            npx playwright test --project=${{ matrix.project }}
          fi

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

      - name: Upload traces & screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.project }}
          path: test-results/
          retention-days: 14

  publish-report:
    name: Publish report summary
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: playwright-report-*
          merge-multiple: false
      - name: Summarise
        run: |
          echo "## E2E Results" >> "$GITHUB_STEP_SUMMARY"
          echo "Reports uploaded as artifacts (playwright-report-<browser>)." >> "$GITHUB_STEP_SUMMARY"
