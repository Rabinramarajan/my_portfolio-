<app-page-layout
  breadcrumb="Case Studies"
  titleLead="Case"
  titleHighlight="Studies"
  subtitle="Deep dives into selected work — the business problem, the solution I built, the architecture behind it, and the outcomes."
>
  @if (caseStudies.value(); as cfg) {
    <div class="cs-grid" appStagger>
      @for (cs of cfg.items; track trackById($index, cs)) {
        <a class="cs-link" [routerLink]="['/case-studies', cs.id]">
          <app-glass-card padding="lg">
            <article class="cs">
              @if (cs.images.length) {
                <img class="cs__img" [src]="cs.images[0]" [alt]="cs.title" loading="lazy" />
              }
              <span class="cs__cat">{{ cs.categoryLabel }}</span>
              <h2 class="cs__title">{{ cs.title }}</h2>
              <p class="cs__tagline">{{ cs.tagline }}</p>

              <ul class="cs__tags">
                @for (tech of cs.technologies.slice(0, 4); track $index) {
                  <li class="cs__tag">{{ tech }}</li>
                }
              </ul>

              <span class="cs__more">
                Read case study
                <app-icon name="ArrowRight" [size]="16" aria-hidden="true" />
              </span>
            </article>
          </app-glass-card>
        </a>
      }
    </div>
  }
</app-page-layout>
