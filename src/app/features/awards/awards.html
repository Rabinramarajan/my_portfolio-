<app-page-layout
  breadcrumb="Awards"
  titleLead="Awards &"
  titleHighlight="Achievements"
  subtitle="Professional recognitions and accolades from organizations and communities."
>
  @if (awards.value(); as cfg) {
    <div class="awards-grid" appStagger>
      @for (award of cfg.items; track trackById($index, award)) {
        <app-glass-card padding="lg">
          <article class="award">
            <span class="award__badge" aria-hidden="true">
              <app-icon [name]="award.icon || 'Award'" [size]="24" />
            </span>

            <div class="award__body">
              <h2 class="award__title">{{ award.title }}</h2>
              <p class="award__issuer">{{ award.issuer }}</p>

              @if (award.description) {
                <p class="award__description">{{ award.description }}</p>
              }

              <div class="award__meta">
                <span class="award__date">
                  <app-icon name="Calendar" [size]="15" aria-hidden="true" />
                  {{ formatDate(award.date) }}
                </span>

                @if (award.link) {
                  <a
                    class="award__link"
                    [href]="award.link"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    View
                    <app-icon name="ExternalLink" [size]="14" aria-hidden="true" />
                  </a>
                }
              </div>
            </div>
          </article>
        </app-glass-card>
      }
    </div>
  }
</app-page-layout>
