<app-page-layout
  breadcrumb="Testimonials"
  titleLead="Client &"
  titleHighlight="Testimonials"
  subtitle="Words from colleagues and clients I've worked with on various projects and initiatives."
>
  @if (testimonials.value(); as cfg) {
    <div class="testimonials-grid" appStagger>
      @for (testimonial of cfg.items; track trackById($index, testimonial)) {
        <app-glass-card padding="lg">
          <article class="testimonial">
            <div class="testimonial__quote">
              <app-icon name="Quote" [size]="32" aria-hidden="true" />
            </div>

            <p class="testimonial__text">{{ testimonial.text }}</p>

            <div class="testimonial__author">
              <div class="testimonial__info">
                <h3 class="testimonial__name">{{ testimonial.author }}</h3>
                <p class="testimonial__role">{{ testimonial.role }} at {{ testimonial.company }}</p>
              </div>
            </div>
          </article>
        </app-glass-card>
      }
    </div>
  }
</app-page-layout>
