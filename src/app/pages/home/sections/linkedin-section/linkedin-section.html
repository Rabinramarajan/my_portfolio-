<!-- ===== LINKEDIN PRESENCE SECTION ===== -->
<section class="linkedin-section" id="linkedin">
  <div class="li-container">
    <div class="section-label">{{ pds.linkedin()?.sectionLabel }}</div>
    <h2 class="li-title">{{ pds.linkedin()?.title }}</h2>
    <p class="li-subtitle">{{ pds.linkedin()?.subtitle }}</p>


    <!-- Live Posts Feed (Elfsight LinkedIn Feed Widget) -->

      <div class="elfsight-app-def48d51-c1c6-4d45-b385-c6fcc8a31a71" data-elfsight-app-lazy></div>
    </div>
  </div>
</section>
