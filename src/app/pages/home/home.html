<app-scroll-progress></app-scroll-progress>
<app-particle-network></app-particle-network>

<main id="main-content" role="main">
  @if (pds.loading()) {
    <div class="home-state" role="status">Loading portfolio…</div>
  } @else if (pds.error()) {
    <div class="home-state home-state--error" role="alert">{{ pds.error() }}</div>
  } @else {
    <app-hero-section />
    <app-about-section />
    <app-experience-section />
    <app-skills-section />
    <app-projects-section />
    <app-resume-section />
    <app-testimonials-section />
    <app-linkedin-section />
    <app-contact-section />
  }
</main>
