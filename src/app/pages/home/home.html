<main id="main-content" role="main" tabindex="-1">
  <!-- ===== HERO SECTION ===== -->
  <app-hero-premium></app-hero-premium>

  <!-- ===== ABOUT SECTION ===== -->
  <app-about></app-about>

  <!-- ===== EXPERIENCE SECTION ===== -->
  <app-experience></app-experience>

  <!-- ===== SKILLS & TECHNOLOGIES SECTION ===== -->

  <!-- ===== FEATURED PROJECTS SECTION ===== -->
  <app-projects></app-projects>

  <!-- ===== RESUME SECTION ===== -->
  @defer (on viewport; prefetch on idle) {
    <app-resume></app-resume>
  } @placeholder {
    <section class="resume-section resume-placeholder" aria-label="Resume section loading">
      <div class="resume-container">
        <div class="skeleton-bar" style="width: 150px; height: 16px; margin-bottom: 24px;"></div>
        <div class="skeleton-bar" style="width: 100%; height: 28px; margin-bottom: 12px;"></div>
        <div class="skeleton-bar" style="width: 100%; height: 16px; margin-bottom: 48px;"></div>
        <div class="skeleton-bar" style="width: 100%; height: 180px;"></div>
      </div>
    </section>
  }

  <!-- ===== LINKEDIN PRESENCE SECTION ===== -->
  <app-linkedin></app-linkedin>
