@if (variant() === 'switch') {
  <button
    type="button"
    class="ts-switch"
    role="switch"
    [attr.aria-checked]="!theme.isDark()"
    [attr.aria-label]="label()"
    (click)="theme.toggle()"
  >
    <span class="ts-switch__label">
      <app-icon [name]="theme.isDark() ? 'Moon' : 'Sun'" [size]="16" aria-hidden="true" />
      {{ label() }}
    </span>
    <span class="ts-track" [class.ts-track--on]="!theme.isDark()">
      <span class="ts-thumb" [class.ts-thumb--on]="!theme.isDark()"></span>
    </span>
  </button>
} @else {
  <button
    type="button"
    class="ts-icon"
    [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
    (click)="theme.toggle()"
  >
    <app-icon [name]="theme.isDark() ? 'Moon' : 'Sun'" [size]="18" aria-hidden="true" />
  </button>
}
