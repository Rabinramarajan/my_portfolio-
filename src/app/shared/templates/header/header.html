<!-- ===== NAVBAR ===== -->
<header class="nav-wrapper" [class.scrolled]="isScrolled()">
  <nav class="navbar" [class.scrolled]="isScrolled()" aria-label="Primary">

    <!-- Logo -->
    <a href="#home" class="nav-logo" aria-label="Rabin R — back to top">
      <span class="logo-icon" aria-hidden="true">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="16 18 22 12 16 6"/>
          <polyline points="8 6 2 12 8 18"/>
        </svg>
      </span>
      <span class="logo-text">{{ pds.nav()?.logo }}</span>
    </a>

    <!-- Desktop Nav Links -->
    <ul class="nav-menu">
      @for (link of pds.nav()?.links; track link.label) {
        <li>
          @if (link.highlight) {
            <a [href]="link.href" class="nav-link nav-link--hire-me" [target]="link.external ? '_blank' : '_self'">{{ link.label }}</a>
          } @else {
            <a [href]="link.href" class="nav-link" [target]="link.external ? '_blank' : '_self'">{{ link.label }}</a>
          }
        </li>
      }
    </ul>


    <!-- Resume CTA -->
    <a [href]="pds.meta()?.resumePdf" download class="btn-resume">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Resume
    </a>

    <!-- Mobile Hamburger -->
    <button class="nav-toggle" [attr.aria-label]="isMenuOpen() ? 'Close menu' : 'Open menu'"
            [attr.aria-expanded]="isMenuOpen()" aria-controls="mobile-menu"
            [class.active]="isMenuOpen()" (click)="toggleMenu()">
      <span aria-hidden="true"></span><span aria-hidden="true"></span><span aria-hidden="true"></span>
    </button>

  </nav>
</header>

<!-- Mobile Dropdown -->
<nav class="mobile-menu" id="mobile-menu" [class.open]="isMenuOpen()" aria-label="Mobile">
  <ul>
    @for (link of pds.nav()?.links; track link.label) {
      <li>
        <a [href]="link.href" [target]="link.external ? '_blank' : '_self'"
           (click)="closeMenu()">{{ link.label }}</a>
      </li>
    }
    <li class="mobile-cta">
      <a [href]="pds.meta()?.resumePdf" download class="btn-resume-mobile">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download Resume
      </a>
    </li>
  </ul>
</nav>

<!-- Backdrop -->
<div class="nav-backdrop" [class.show]="isMenuOpen()" (click)="closeMenu()" aria-hidden="true"></div>
