<!-- ===== NAVBAR ===== -->
<header class="nav-wrapper" [class.scrolled]="isScrolled()">
  <nav class="navbar" [class.scrolled]="isScrolled()" aria-label="Primary">

    <!-- Logo -->
    <a href="#home" class="nav-logo" aria-label="Rabin R — back to top">
      <span class="logo-icon" aria-hidden="true">
        <!-- R monogram with code-caret counter (see public/brand/monogram.svg) -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path fill-rule="evenodd" d="M5 3h9a6 6 0 0 1 2.53 11.44L20 21h-5.3l-3.1-5H10v5H5V3Zm5 4.5 4.5 2.25L10 12v-1.4l2.2-.85L10 8.9V7.5Z"/>
        </svg>
      </span>
      <span class="logo-text">rabin<span class="logo-dot">.</span>r</span>
    </a>

    <!-- Desktop Nav Links -->
    <ul class="nav-menu">
      @for (link of pds.nav()?.links; track link.label) {
        <li>
          @if (link.highlight) {
            <a [href]="link.href" class="nav-link nav-link--hire-me" [target]="link.external ? '_blank' : '_self'">{{ link.label }}</a>
          } @else {
            <a [href]="link.href" class="nav-link" [class.nav-link--active]="isActive(link.href)"
               [attr.aria-current]="isActive(link.href) ? 'true' : null"
               [target]="link.external ? '_blank' : '_self'">{{ link.label }}</a>
          }
        </li>
      }
    </ul>


    <!-- GitHub -->
    <a [href]="pds.meta()?.github" target="_blank" rel="noopener noreferrer" class="nav-github" aria-label="Visit Rabin R's GitHub profile">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path
          d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z" />
      </svg>
    </a>

    <!-- Resume CTA -->
    <a [href]="pds.meta()?.resumePdf" download class="btn-resume">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Resume
    </a>

    <!-- Mobile Hamburger -->
    <button class="nav-toggle" [attr.aria-label]="isMenuOpen() ? 'Close menu' : 'Open menu'"
            [attr.aria-expanded]="isMenuOpen()" aria-controls="mobile-menu"
            [class.active]="isMenuOpen()" (click)="toggleMenu()">
      <span aria-hidden="true"></span><span aria-hidden="true"></span><span aria-hidden="true"></span>
    </button>

  </nav>
</header>

<!-- Mobile Dropdown -->
<nav class="mobile-menu" id="mobile-menu" [class.open]="isMenuOpen()" aria-label="Mobile">
  <ul>
    @for (link of pds.nav()?.links; track link.label) {
      <li>
        <a [href]="link.href" [target]="link.external ? '_blank' : '_self'"
           (click)="closeMenu()">{{ link.label }}</a>
      </li>
    }
    <li class="mobile-cta">
      <a [href]="pds.meta()?.resumePdf" download class="btn-resume-mobile">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download Resume
      </a>
    </li>
  </ul>
</nav>

<!-- Backdrop -->
<div class="nav-backdrop" [class.show]="isMenuOpen()" (click)="closeMenu()" aria-hidden="true"></div>
